services:
  mongo:
    image: mongo:6
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI

  backend:
    image: mean-backend:dev-1
    depends_on:
      - mongo
      - minio
      - mailpit
    ports:
      - "3000:3000"
    environment:
      # Mongo
      MONGODB_URI: mongodb://mongo:27017/mean

      # MinIO
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123

      # Correo (SMTP de pruebas)
      MAIL_HOST: mailpit
      MAIL_PORT: "1025"
      MAIL_SECURE: "false"
      MAIL_USER: ""
      MAIL_PASS: ""
      MAIL_FROM: "no-reply@mean.local"

volumes:
  mongo_data:
  minio_data:
